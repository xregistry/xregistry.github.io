name: Regen the xreg.io xreg files

on:
  repository_dispatch:
    types: [main_branch_updated]
  workflow_dispatch:

jobs:
  update-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get xr exe
        run: |
          container_id=$(docker create ghcr.io/xregistry/xr)
          mkdir -p ${{ github.workspace }}/bin
          docker cp $container_id:/xr "${{ github.workspace }}/bin/xr"
          docker rm $container_id
          chmod +x "${{ github.workspace }}/bin/xr"
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Run local script
        run: ./tools/buildsite

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          git add .
          
          # Only commit if there are actual changes to prevent workflow failure
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automated update via remote trigger"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
